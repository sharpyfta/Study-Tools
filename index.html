<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GN-Math | Study Tools</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script>
</head>
<body>

    <nav class="navbar">
        <div class="logo">GN-MATH<span>.DEV</span></div>
        <div class="search-container">
            <input type="text" id="searchBar" placeholder="Search for tools or games..." onkeyup="search()">
        </div>
        <div class="nav-links">
            <button onclick="cloakTab()">Settings</button>
        </div>
    </nav>

    <main class="container">
        <section class="game-grid" id="gameGrid">
            <div class="card" onclick="openGame('https://example.com/game1')">
                <img src="assets/game1.jpg" alt="Game Name">
                <div class="card-info">
                    <h3>Slope</h3>
                    <span class="tag">Popular</span>
                </div>
            </div>

            <div class="card" onclick="openGame('https://example.com/game2')">
                <img src="assets/game2.jpg" alt="Game Name">
                <div class="card-info">
                    <h3>1v1.LOL</h3>
                    <span class="tag">Hot</span>
                </div>
            </div>
            
            </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
