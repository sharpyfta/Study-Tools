<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Study Tools | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">GN-MATH<span>.DEV</span></div>
        
        <div class="search-box">
            <i class="fa fa-search"></i>
            <input type="text" id="searchBar" placeholder="Search for tools..." onkeyup="filterGames()">
        </div>

        <div class="nav-actions">
            <button class="nav-btn" onclick="openModal('settings')"><i class="fa fa-cog"></i></button>
            <button class="nav-btn" onclick="openModal('info')"><i class="fa fa-info-circle"></i></button>
            <button class="nav-btn" onclick="openModal('contact')"><i class="fa fa-envelope"></i></button>
            <button class="nav-btn" onclick="openModal('rules')"><i class="fa fa-gavel"></i></button>
        </div>
    </nav>

    <div class="container">
        <div class="grid" id="gameGrid">
            </div>
    </div>

    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
