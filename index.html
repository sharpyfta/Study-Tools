<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Tools | GN-Style</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">GN-MATH<span>.DEV</span></div>
        
        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchBar" placeholder="Search tools..." onkeyup="filterContent()">
        </div>

        <div class="nav-buttons">
            <button onclick="showModal('settings')"><i class="fa-solid fa-gear"></i></button>
            <button onclick="showModal('info')"><i class="fa-solid fa-circle-info"></i></button>
            <button onclick="showModal('contact')"><i class="fa-solid fa-envelope"></i></button>
            <button onclick="showModal('rules')"><i class="fa-solid fa-gavel"></i></button>
        </div>
    </nav>

    <div class="main-content">
        <div class="grid" id="contentGrid">
            </div>
    </div>

    <div id="modalOverlay" class="modal-overlay" onclick="closeModal()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div id="modalContent"></div>
            <button class="close-btn" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
