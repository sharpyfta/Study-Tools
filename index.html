<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Tools | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">STUDY<span>TOOLS</span></div>
        
        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchBar" placeholder="Search for games..." onkeyup="filterContent()">
        </div>

        <div class="nav-actions">
            <button class="nav-btn" title="Cloaking & Themes" onclick="openModal('settings')"><i class="fa fa-cog"></i></button>
            <button class="nav-btn" title="About" onclick="openModal('info')"><i class="fa fa-info-circle"></i></button>
            <button class="nav-btn" title="Contact" onclick="openModal('contact')"><i class="fa fa-envelope"></i></button>
            <button class="nav-btn" title="Request Game" onclick="openModal('rules')"><i class="fa fa-hammer"></i></button>
        </div>
    </nav>

    <main class="main-content">
        <div class="grid" id="contentGrid">
            </div>
    </main>

    <div id="modalOverlay" class="modal-overlay" onclick="closeModal()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div id="modalBody">
                </div>
            <button class="close-modal-btn" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
